engine: "1"
pipeline:
  name: hello
stages:
  greet:
    run: |
      echo "Hello from LabHit CI (process)"
      test "$MY_SECRET" = "hello123" && echo "process secret OK" || { echo "MISSING(process)"; exit 1; }
  isolated:
    sandbox:
      image: alpine:3
    run: |
      echo "Hello from a container"
      test "$MY_SECRET" = "hello123" && echo "container secret OK" || { echo "MISSING(container)"; exit 1; }
